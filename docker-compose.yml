version: "3.9"
services:
  botpress:
    image: botpress/server:latest
    env_file:
      - .env
    environment:
      BP_HOST: 0.0.0.0
      NODE_ENV: production
      BP_IS_DOCKER: "true"
      PORT: 3000
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DB: ${PG_DB}
    volumes:
      - botpress_data:/botpress/data
    ports:
      - "3000:3000"
    expose:
      - "3000"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - botpress
    restart: unless-stopped

volumes:
  botpress_data:
